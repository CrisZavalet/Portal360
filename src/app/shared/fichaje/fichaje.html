<div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-8">

  <div class="text-center lg:text-left space-y-2">

    <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400">
      {{ currentDate }}
    </div>

    <div class="text-3xl sm:text-3xl lg:text-4xl font-bold tracking-tight text-slate-800 dark:text-white">
      {{ formattedTime }}
    </div>
    

    <div class="text-sm text-indigo-500 font-medium">
      {{ tipoFichaje }}
    </div>

  @if (horaFichaje != null) {
      <div class="text-sm text-green-500">
        Hora de fichaje: {{ horaFichaje }}
      </div>
    }

  </div>

  <div class="flex flex-col items-center gap-4 w-full lg:w-auto">

    <div class="flex justify-center gap-4">

      @if (!isFichaje) {
      <button (click)="start()"
        class="bg-green-500 text-white rounded w-12 h-12 sm:w-14 sm:h-14 p-2 transition-all duration-300 hover:shadow-2xl hover:-translate-y-1">
        <img src="./assets/icons/play.png" class="w-full h-full object-contain">
      </button>
      }

      @if (isFichaje) {
      <button (click)="pause()"
        class="bg-yellow-500 text-white rounded w-12 h-12 sm:w-14 sm:h-14 p-2 transition-all duration-300 hover:shadow-2xl hover:-translate-y-1">
        <img src="./assets/icons/pause.png" class="w-full h-full object-contain">
      </button>
      }

      <button (click)="stop()"
        class="bg-red-500 text-white rounded w-12 h-12 sm:w-14 sm:h-14 p-2 transition-all duration-300 hover:shadow-2xl hover:-translate-y-1">
        <img src="./assets/icons/stop.png" class="w-full h-full object-contain">
      </button>

    </div>

    <div class="flex flex-wrap justify-center gap-4 text-sm
      bg-gradient-to-br from-slate-50 via-blue-100 to-indigo-200
      rounded-lg p-3 w-full sm:w-auto
      dark:from-slate-700 dark:via-indigo-700 dark:to-indigo-900 dark:text-white">

      <button (click)="tipoFichaje = 'Presencial'"
        class="transition-all duration-300 hover:-translate-y-1"
        [ngClass]="tipoFichaje === 'Presencial'
          ? 'text-indigo-600 font-semibold dark:text-indigo-400 border-b-2 border-white-600'
          : 'text-slate-500'">
        Presencial
      </button>

      <button (click)="tipoFichaje = 'Teletrabajo'"
        class="transition-all duration-300 hover:-translate-y-1"
        [ngClass]="tipoFichaje === 'Teletrabajo'
          ? 'text-indigo-600 font-semibold dark:text-indigo-400 border-b-2 border-white-600'
          : 'text-slate-500 dark:text-slate-400'">
        Teletrabajo
      </button>

    </div>

  </div>

</div>
