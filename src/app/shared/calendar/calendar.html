<div class="w-full max-w-4xl mx-auto
             bg-gradient-to-br from-slate-100 via-indigo-100 to-indigo-200
            backdrop-blur-xl
            border border-white/20
            shadow-2xl shadow-black/20
            rounded-3xl p-1">

  <h2 class="text-black text-lg font-medium mb-6 text-center dark:text-white">
    Semana actual
  </h2>

  <div class="block lg:grid grid-cols-7 gap-4 text-center">

    @for (day of weekDays; track day.date) { 
      <div
        class="p-4 rounded-2xl transition-all duration-300 cursor-pointer hover:bg-white/20 hover:text-black/80"
        [class.bg-indigo-500]="day.isToday"
        [class.text-white]="day.isToday"
        [class.shadow-lg]="day.isToday"
        [class.scale-105]="day.isToday"
        [class.text-gray-400]="!day.isToday">


        <div class="text-sm uppercase tracking-wide">   
          {{ day.label }}
        </div>

        <div class="text-xl font-bold mt-2">
          {{ day.date.getDate() }}
        </div>

          @if (day.events?.length) {
          <div class="mt-2 flex gap-1 justify-center">
            @for (ev of day.events; track ev.label) {
              <span 
                [class.bg-green-400]="ev.type === 'vacaciones'"
                [class.bg-blue-400]="ev.type === 'baja'"
                [class.bg-red-400]="ev.type === 'ausencia'"
                class="w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold text-white">
                {{ ev.type === 'vacaciones' ? 'V' : ev.type === 'baja' ? 'B' : 'A' }}
              </span>
            }
          </div>
        }

        
      </div>
    }

  </div>

 
</div>
 <div class="block 2xl:flex mt-4 gap-6 justify-center items-center">
  <div class="block 2xl:flex justify-center mt-2">
     <span class=" bg-green-400 w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold text-white">
                V
     </span><span class="flex"> Vacaciones</span>
     </div>  
      
       <div class="block 2xl:flex justify-center mt-2">
     <span class="bg-blue-400 w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold text-white">
                B
     </span><span class="flex"> Baja médica</span>
     </div>         
            
       <div class="block 2xl:flex justify-center mt-2">
     <span class="bg-red-400 w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold text-white">
                A
     </span><span class="flex"> Ausencia</span>
     </div>         
            
  </div>
