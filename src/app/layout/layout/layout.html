<div class="h-screen flex overflow-hidden relative">

  @if (isMobile && mobileOpen) {
    <div
      class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40"
      (click)="closeMobile()">
    </div>
  }

  <aside
    class="h-full bg-gradient-to-r from-[#1C1854] to-[#081440] text-white z-50 transition-transform duration-300"
   
  [class.fixed]="isMobile"
  [class.relative]="!isMobile"

  [class.top-0]="isMobile"
  [class.left-0]="isMobile"
  [class.w-64]="!sidebarCollapsed"
  [class.w-20]="sidebarCollapsed && !isMobile"

  [class.transform]="isMobile"
  [class.-translate-x-full]="isMobile && !mobileOpen"
  [class.translate-x-0]="isMobile && mobileOpen"

  >
    <app-sidebar class="z-80"
      [collapsed]="sidebarCollapsed"
      (toggle)="toggleSidebar()"
      (closeMobile)="closeMobile()">
    </app-sidebar>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden ">

    @if (isMobile) {
      <div class="flex items-center justify-between p-4 bg-gradient-to-r from-[#1C1854] to-[#081440] text-white">
        <div class="flex justify-center">
          <img src="./assets/PORTAL360.png" alt="Portal360 Logo" class="w-40 ">
        </div>
        <div class="p-4 ">
          <button (click)="mobileOpen = true">
            <img
              src="./assets/menu-hamburger.png"
              class="w-6 h-6 "
            />
          </button>
        </div>
      </div>
    }

    <main
      class="flex-1 p-6 overflow-auto transition-all duration-300
             bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100
             dark:from-slate-900 dark:via-slate-800 dark:to-slate-900"
    >
      <router-outlet />
    </main>

  </div>
</div>
