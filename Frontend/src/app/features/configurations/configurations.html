<div class="p-4 md:p-8 text-slate-800 dark:text-slate-200">
  
  <h1 class="text-2xl font-bold mb-6 text-black">Configuración</h1>

  <div class="flex flex-col md:flex-row gap-6">

    <div class="md:w-1/4 bg-white/10 backdrop-blur-lg rounded-2xl p-4 shadow-lg">
      <ul class="space-y-2">
       
        <li class="p-2 rounded-lg hover:bg-indigo-500/20 cursor-pointer">Seguridad</li>
        <li class="p-2 rounded-lg hover:bg-indigo-500/20 cursor-pointer">Notificaciones</li>
      </ul>
    </div>

    <div class="flex-1 bg-white/40 backdrop-blur-lg rounded-2xl p-6 shadow-lg">

      <div class="mt-1">
        <h2 class="text-xl font-semibold mb-4">Seguridad</h2>

        <div class="space-y-4">
          <input type="password" placeholder="Nueva contraseña"
            class="input input-bordered border border-gray-300 rounded-lg w-full bg-white/20 text-black placeholder-gray-300" />

          <input type="password" placeholder="Confirmar contraseña"
            class="input input-bordered border border-gray-300 rounded-lg w-full bg-white/20 text-black placeholder-gray-300" />

          <div class="flex items-center justify-between">
            <span>Autenticación en 2 pasos</span>
            <input type="checkbox" class="toggle toggle-primary checked:border-green-500 checked:bg-green-400 checked:text-green-800" 
/>
          </div>
        </div>

        <button class="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-white">
          Actualizar seguridad
        </button>
      </div>

      <div class="mt-10">
        <h2 class="text-xl font-semibold mb-4">Notificaciones</h2>

        <div class="space-y-3">
          <div class="flex justify-between items-center">
            <span>Notificaciones por email</span>
            <input type="checkbox" class="toggle toggle-primary checked:border-green-500 checked:bg-green-400 checked:text-green-800" />
          </div>

          <div class="flex justify-between items-center">
            <span>Avisos de fichaje</span>
            <input type="checkbox" class="toggle toggle-primary checked:border-green-500 checked:bg-green-400 checked:text-green-800" />
          </div>

          <div class="flex justify-between items-center">
            <span>Solicitudes de ausencia</span>
            <input type="checkbox" class="toggle toggle-primary checked:border-green-500 checked:bg-green-400 checked:text-green-800" />
          </div>
        </div>
      </div>

      

    </div>
  </div>
</div>
